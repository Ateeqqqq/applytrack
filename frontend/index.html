<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApplyTrack | Job Application Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="app-header">
    <div class="logo-block">
      <h1 class="logo">Apply<span>Track</span></h1>
      <p class="tagline">Track every job application in one clean dashboard</p>
    </div>
    <button id="openAddModalBtn" class="btn btn-primary">+ Add Application</button>
  </header>

  <main class="container">

    <!-- ===================== STATS CARDS ===================== -->
    <section class="stats-grid">
      <div class="stat-card">
        <p class="stat-label">Total</p>
        <p class="stat-value" id="statTotal">0</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Applied</p>
        <p class="stat-value" id="statApplied">0</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Interview</p>
        <p class="stat-value" id="statInterview">0</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Offer</p>
        <p class="stat-value" id="statOffer">0</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Rejected</p>
        <p class="stat-value" id="statRejected">0</p>
      </div>
    </section>

    <!-- ===================== CONTROLS: SEARCH + FILTER ===================== -->
    <section class="controls-bar">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search by company or role..."
      />

      <select id="statusFilter" class="status-filter">
        <option value="">All Statuses</option>
        <option value="Applied">Applied</option>
        <option value="Interview">Interview</option>
        <option value="Rejected">Rejected</option>
        <option value="Offer">Offer</option>
      </select>
    </section>

    <!-- ===================== APPLICATIONS TABLE ===================== -->
    <section class="table-wrapper">
      <table class="applications-table">
        <thead>
          <tr>
            <th>Company</th>
            <th>Role</th>
            <th>Status</th>
            <th>Date Applied</th>
            <th>Link</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="applicationsTableBody">
          <!-- Rows are injected here by script.js -->
        </tbody>
      </table>

      <p id="emptyState" class="empty-state" style="display: none;">
        No applications found. Click "+ Add Application" to get started.
      </p>
    </section>

  </main>

  <!-- ===================== ADD / EDIT MODAL ===================== -->
  <div id="applicationModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Application</h2>
        <button id="closeModalBtn" class="btn-close">&times;</button>
      </div>

      <form id="applicationForm">
        <!-- Hidden field to store the id when editing -->
        <input type="hidden" id="applicationId" />

        <label for="companyName">Company Name</label>
        <input type="text" id="companyName" required placeholder="e.g. Google" />

        <label for="jobRole">Job Role</label>
        <input type="text" id="jobRole" required placeholder="e.g. Backend Developer" />

        <label for="jobUrl">Job Posting URL</label>
        <input type="url" id="jobUrl" placeholder="https://..." />

        <label for="status">Status</label>
        <select id="status" required>
          <option value="Applied">Applied</option>
          <option value="Interview">Interview</option>
          <option value="Rejected">Rejected</option>
          <option value="Offer">Offer</option>
        </select>

        <label for="dateApplied">Date Applied</label>
        <input type="date" id="dateApplied" required />

        <div class="modal-actions">
          <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Application</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
